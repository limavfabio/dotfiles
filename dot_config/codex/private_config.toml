[notice]
hide_full_access_warning = true

[features]
js_repl = true
prevent_idle_sleep = true
apps = true
memories = false
goals = true

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
env_http_headers = { "CONTEXT7_API_KEY" = "CONTEXT7_API_KEY" }

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--autoConnect"]

[mcp_servers.chrome-devtools.tools.new_page]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.click]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.evaluate_script]
approval_mode = "approve"

[tui]
status_line = ["model-with-reasoning", "context-usage", "project-root", "five-hour-limit", "weekly-limit", "fast-mode"]
notifications = true
notification_method = "auto"

[tui.model_availability_nux]
"gpt-5.5" = 4
