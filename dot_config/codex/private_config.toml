model = "gpt-5.4"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
personality = "pragmatic"

[projects."/home/limavfabio/Documents/repos"]
trust_level = "trusted"

[projects."/home/limavfabio/Documents/repos/varejo_rails"]
trust_level = "trusted"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"
"gpt-5.2-codex" = "gpt-5.4"

[features]
js_repl = true
prevent_idle_sleep = true
use_linux_sandbox_bwrap = true
apps = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--autoConnect"]

[tui]
status_line = ["model-with-reasoning", "context-remaining", "project-root", "five-hour-limit", "weekly-limit", "fast-mode"]
notifications = true
notification_method = "auto"
